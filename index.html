<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>AE Eamac</title>
</head>

<body class="mx-2">
    <!-- Navbar goes here -->
    <nav class="bg-white shadow-lg">
        <div>
            <div class="flex justify-between rounded-lg bg-gray-800 my-2">
                <div class="flex w-full items-center justify-between md:w-auto ml-2">
                    <a href="#">
                        <span class="sr-only">AE Eamac</span>
                        <img alt="Your Company" class="h-8 w-auto sm:h-10"
                            src="https://tailwindui.com/img/logos/mark.svg?color=indigo&shade=600">
                    </a>


                    <!-- Primary Navbar items -->
                    <div class="hidden md:flex items-center space-x-8 pr-4 ml-10 my-6 ">
                        <a href="#"
                            class="text-gray-500 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">Daddshboard</a>

                        <a href="#"
                            class="text-gray-500 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">Team</a>


                        <a href="#"
                            class="text-gray-500 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">Team</a>


                        <a href="#"
                            class="text-gray-500 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">Team</a>

                    </div>
                </div>

                <!-- Mobile menu button -->
                <div class="md:hidden flex items-center mr-2 my-2">
                    <button class="outline-none mobile-menu-button">
                        <svg class=" w-6 h-6 text-gray-500 hover:text-blue-500 " x-show="!showMenu" fill="none"
                            stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>

                </div>
            </div>
        </div>
        <!-- mobile menu -->
        <div class="hidden mobile-menu">
            <div class="space-y-1 px-2 pt-2 pb-3 sm:px-3 rounded-lg bg-gray-700">

                <a href="#" class="bg-blue-700 text-white block px-3 py-2 rounded-md text-base font-medium"
                    aria-current="page">Dashboard</a>

                <a href="#"
                    class="text-gray-300 hover:bg-gray-600 hover:text-white block px-3 py-2 rounded-md text-base font-medium">Team</a>

                <a href="#"
                    class="text-gray-300 hover:bg-gray-600 hover:text-white block px-3 py-2 rounded-md text-base font-medium">Projects</a>

                <a href="#"
                    class="text-gray-300 hover:bg-gray-600 hover:text-white block px-3 py-2 rounded-md text-base font-medium">Calendar</a>

                <a href="#"
                    class="text-gray-300 hover:bg-gray-600 hover:text-white block px-3 py-2 rounded-md text-base font-medium">Reports</a>

            </div>

        </div>


        <!-- Mot President -->

        <figure class="md: rounded-lg text-center bg-gray-200">
            <h1 class="pb-4 text-2xl tracking-tight font-semibold">Mot du Président</h1>
            <img src="assets/avatar.png" class="w-32 h-32 rounded-full mx-auto" alt="president">

            <div class="space-y-4">
                <blockquote>
                    <p class="pt-6 text-lg">
                        Lorem ipsum dolor sit amet consectetur adipisicing elit. Ab suscipit provident, possimus ratione
                        iure recusandae fugiat sint esse quos magni aspernatur molestias tempore ipsum ex sapiente,
                        dolores
                        est blanditiis dolore.
                    </p>
                </blockquote>
                <figcaption class="font-medium">
                    <div class="text-cyan-600 hover:text-cyan-500">
                        John Doe
                    </div>
                    <div class="text-gray-500">
                        Ingénieur Météo Eamac

                    </div>

                </figcaption>

            </div>
        </figure>




        <!-- Fin Mot President-->

        <script>
            const btn = document.querySelector("button.mobile-menu-button");
            const menu = document.querySelector(".mobile-menu");

            btn.addEventListener("click", () => {
                menu.classList.toggle("hidden");
            });
        </script>
    </nav>

</html>
